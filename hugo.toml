baseURL = "https://liangjinzhi.com/"
# 建议将 languageCode 改为 locale，避免 Hugo 的弃用警告
locale = 'zh-cn' 
title = '我的个人博客'
theme = 'stack'
publishDir = "docs"

# 忽略 HTML 渲染警告
ignoreLogs = ['warning-goldmark-raw-html']

# 核心：允许渲染 Markdown 中的 HTML（必须这样分层嵌套）
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 关键：告诉 Hugo 不要尝试智能截取，除非遇到 [params]
  summaryLength = 0
